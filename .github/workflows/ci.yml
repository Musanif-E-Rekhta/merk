name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

  schema-drift:
    name: Schema drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merk
        uses: actions/checkout@v4
        with:
          path: merk

      - name: Checkout musanif-contracts
        uses: actions/checkout@v4
        with:
          repository: Musanif-E-Rekhta/musanif-contracts
          path: musanif-contracts

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: merk

      - name: Dump GraphQL schema
        working-directory: merk
        run: cargo run --quiet --bin merk-dump-schema -- ../musanif-contracts/schema.graphql

      - name: Verify schema is up to date
        working-directory: musanif-contracts
        run: |
          if ! git diff --exit-code schema.graphql; then
            echo "::error::musanif-contracts/schema.graphql is stale. Run 'make schema' from the repo root and commit the result alongside your backend GraphQL changes."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: merk-linux-amd64
          path: target/release/merk
          retention-days: 7
